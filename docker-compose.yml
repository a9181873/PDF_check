services:
  backend:
    image: pdf-check-backend:latest
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pdf-check-backend
    ports:
      - "8000:8000"
    environment:
      DATA_DIR: /app/runtime
      HF_HOME: /app/.cache/huggingface
      OCR_LANGS: chi_tra+chi_sim+eng
      DEBUG: "false"
    volumes:
      - backend_runtime:/app/runtime
      - backend_hf_cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  backend_runtime:
  backend_hf_cache:
